apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-db-credentials
  labels:
    app.kubernetes.io/name: pipelineatlas
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  ATLAS_API_DB_USER: {{ .Values.postgres.auth.username }}
  ATLAS_API_DB_PASSWORD: {{ .Values.postgres.auth.password }}
  POSTGRES_USER: {{ .Values.postgres.auth.username }}
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-api-secrets
  labels:
    app.kubernetes.io/name: pipelineatlas
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  ATLAS_JWT_SECRET: {{ .Values.api.jwtSecret | default "change-me-in-production" }}
